name: Prisma — Actualizar Briefing Diário

on:
  schedule:
    # 07:00 12:00 18:00 22:00 UTC (= 07/08h, 12/13h, 18/19h, 22/23h Lisboa)
    - cron: "0 7,12,18,22 * * *"
  workflow_dispatch:

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install feedparser yfinance mistralai requests

      - name: Criar pasta data (se não existir)
        run: mkdir -p data

      - name: Correr fetch_news.py
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python fetch_news.py

      - name: Commit e push dos dados gerados
        run: |
          git config user.name  "Prisma Bot"
          git config user.email "prisma-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "briefing: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
