name: Prisma — Actualizar Briefing Diário

on:
  schedule:
    # 06:00 09:00 12:00 15:00 18:00 21:00 UTC (= mesmas horas Lisboa no inverno)
    - cron: "0 6,9,12,15,18,21 * * *"
  # Permite correr manualmente no GitHub (botão "Run workflow")
  workflow_dispatch:

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para fazer commit dos JSON

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install feedparser yfinance google-genai

      - name: Criar pasta data (se não existir)
        run: mkdir -p data

      - name: Correr fetch_news.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_news.py

      - name: Commit e push dos dados gerados
        run: |
          git config user.name  "Prisma Bot"
          git config user.email "prisma-bot@users.noreply.github.com"
          git add data/
          # Só faz commit se houver alterações
          git diff --staged --quiet || git commit -m "briefing: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
